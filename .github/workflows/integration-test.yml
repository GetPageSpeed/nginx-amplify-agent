name: Integration Tests

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  test-deb:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: jrei/systemd-ubuntu:jammy
            name: Ubuntu 22.04 (jammy)
          - image: jrei/systemd-ubuntu:noble
            name: Ubuntu 24.04 (noble)
          # jrei/systemd-debian:{bookworm,trixie} were repushed arm64-only on
          # 2026-05-03 and can't be pulled on amd64 runners. Use dokken's
          # multi-arch systemd-enabled Debian images instead.
          - image: dokken/debian-12
            name: Debian 12 (bookworm)
          - image: dokken/debian-13
            name: Debian 13 (trixie)
    name: ${{ matrix.name }}
    steps:
      - name: Start systemd container
        run: |
          docker run -d --name agent-test \
            --privileged --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            ${{ matrix.image }}
          # Wait for systemd to initialize
          sleep 3
          docker exec agent-test systemctl --no-pager status || true

      - name: Install prerequisites
        run: docker exec agent-test bash -c 'apt-get update && apt-get install -y curl python3'

      - name: Run install.sh
        run: |
          docker exec -e API_KEY="${{ secrets.AMPLIFY_TEST_API_KEY }}" agent-test \
            bash -c 'curl -sSL https://amplify.getpagespeed.com/install.sh | bash -s -- -y'

      - name: Verify agent is running
        run: |
          # Give agent time to start and send first update
          sleep 15
          docker exec agent-test systemctl is-active amplify-agent
          docker exec agent-test grep -q 'post.*200' /var/log/amplify-agent/agent.log
          echo 'Agent communicating with server OK'

      - name: Show agent log and diagnostics on failure
        if: failure()
        run: |
          docker exec agent-test cat /var/log/amplify-agent/agent.log 2>/dev/null || true
          echo "--- systemctl status ---"
          docker exec agent-test systemctl status amplify-agent --no-pager 2>/dev/null || true
          echo "--- journalctl ---"
          docker exec agent-test journalctl -u amplify-agent --no-pager -n 30 2>/dev/null || true
          echo "--- try manual import ---"
          docker exec agent-test python3 -c 'import amplify.agent.supervisor' 2>&1 || true

      - name: Cleanup
        if: always()
        run: docker rm -f agent-test 2>/dev/null || true

  test-rpm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: almalinux/8-init
            name: AlmaLinux 8
          - image: almalinux/9-init
            name: AlmaLinux 9
    name: ${{ matrix.name }}
    steps:
      - name: Start systemd container
        run: |
          docker run -d --name agent-test \
            --privileged --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            ${{ matrix.image }}
          sleep 3
          docker exec agent-test systemctl --no-pager status || true

      - name: Install prerequisites
        run: docker exec agent-test bash -c 'dnf install -y python3'

      - name: Run install.sh
        run: |
          docker exec -e API_KEY="${{ secrets.AMPLIFY_TEST_API_KEY }}" agent-test \
            bash -c 'curl -sSL https://amplify.getpagespeed.com/install.sh | bash -s -- -y'

      - name: Verify agent is running
        run: |
          sleep 15
          docker exec agent-test systemctl is-active amplify-agent
          docker exec agent-test pgrep -f amplify-agent
          docker exec agent-test grep -q 'post.*200' /var/log/amplify-agent/agent.log
          echo 'Agent communicating with server OK'

      - name: Show agent log and diagnostics on failure
        if: failure()
        run: |
          docker exec agent-test cat /var/log/amplify-agent/agent.log 2>/dev/null || true
          echo "--- systemctl status ---"
          docker exec agent-test systemctl status amplify-agent --no-pager 2>/dev/null || true
          echo "--- journalctl ---"
          docker exec agent-test journalctl -u amplify-agent --no-pager -n 30 2>/dev/null || true
          echo "--- try manual import ---"
          docker exec agent-test python3 -c 'import amplify.agent.supervisor' 2>&1 || true

      - name: Cleanup
        if: always()
        run: docker rm -f agent-test 2>/dev/null || true
